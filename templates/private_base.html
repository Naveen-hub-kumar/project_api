<!DOCTYPE html>
<html>
<head>

    <title>
        Attendance Dashboard
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>
<body>

<!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <!-- Logo -->

        <a class="navbar-brand"
           href="/attendance/">

           Attendance System

        </a>

        <!-- Mobile Toggle -->

        <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
        >

            <span class="navbar-toggler-icon"></span>

        </button>

        <!-- Navbar Links -->

        <div
            class="collapse navbar-collapse"
            id="navbarNav"
        >

            <ul class="navbar-nav ms-auto">

                <!-- Dashboard -->

                <li class="nav-item">

                    <a class="nav-link"
                       href="/attendance/">

                       Dashboard

                    </a>

                </li>

                <!-- Students -->

                <li class="nav-item">

                    <a class="nav-link"
                       href="/students/">

                       Students

                    </a>

                </li>

                <!-- Attendance -->

                <li class="nav-item">

                    <a class="nav-link"
                       href="/attendance/list/">

                       Attendance

                    </a>

                </li>

                <!-- Mark Attendance -->

                <li class="nav-item">

                    <a class="nav-link"
                       href="/attendance/mark/">

                       Mark Attendance

                    </a>

                </li>

                <!-- Reports -->

                <li class="nav-item">

                    <a class="nav-link"
                       href="/reports/">

                       Reports

                    </a>

                </li>

                <!-- Logout -->

                <li class="nav-item">

                    <a class="nav-link text-warning"
                       href="/accounts/logout/">

                       Logout

                    </a>

                </li>

            </ul>

        </div>

    </div>

</nav>

<!-- Main Content -->

<div class="container mt-4">

    {% block content %}

    {% endblock %}

</div>

<!-- Bootstrap JS -->

<script
src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
</script>

</body>
</html>
