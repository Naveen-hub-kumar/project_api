<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>

        Attendance Management System

    </title>

    <!-- Bootstrap CSS -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container-fluid">

        <!-- LOGO -->

        <a
            class="navbar-brand fw-bold"
            href="/attendance/"
        >

            AMS

        </a>

        <!-- MOBILE TOGGLE -->

        <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
        >

            <span class="navbar-toggler-icon"></span>

        </button>

        <!-- NAVBAR LINKS -->

        <div
            class="collapse navbar-collapse"
            id="navbarNav"
        >

            <!-- LEFT MENU -->

            <ul class="navbar-nav me-auto">

                <!-- DASHBOARD -->

                <li class="nav-item">

                    <a
                        class="nav-link"
                        href="/attendance/"
                    >

                        Dashboard

                    </a>

                </li>

                <!-- STUDENTS -->

                <li class="nav-item dropdown">

                    <a
                        class="nav-link dropdown-toggle"
                        href="#"
                        role="button"
                        data-bs-toggle="dropdown"
                    >

                        Students

                    </a>

                    <ul class="dropdown-menu">

                        <li>

                            <a
                                class="dropdown-item"
                                href="/students/"
                            >

                                Student List

                            </a>

                        </li>

                        <li>

                            <a
                                class="dropdown-item"
                                href="/students/add/"
                            >

                                Add Student

                            </a>

                        </li>

                    </ul>

                </li>

                <!-- ATTENDANCE -->

                <li class="nav-item">

                    <a
                        class="nav-link"
                        href="/attendance/list/"
                    >

                        Attendance

                    </a>

                </li>

                <!-- REPORTS -->

                <li class="nav-item dropdown">

                    <a
                        class="nav-link dropdown-toggle"
                        href="#"
                        role="button"
                        data-bs-toggle="dropdown"
                    >

                        Reports

                    </a>

                    <ul class="dropdown-menu">

                        <li>

                            <a
                                class="dropdown-item"
                                href="/reports/"
                            >

                                Report Dashboard

                            </a>

                        </li>

                        <li>

                            <a
                                class="dropdown-item"
                                href="/reports/student-report/"
                            >

                                Student Report

                            </a>

                        </li>

                        <li>

                            <a
                                class="dropdown-item"
                                href="/reports/date-range-report/"
                            >

                                Date Range Report

                            </a>

                        </li>

                    </ul>

                </li>

                <!-- TEACHERS -->

                <li class="nav-item dropdown">

                    <a
                        class="nav-link dropdown-toggle"
                        href="#"
                        role="button"
                        data-bs-toggle="dropdown"
                    >

                        Teachers

                    </a>

                    <ul class="dropdown-menu">

                        <li>

                            <a
                                class="dropdown-item"
                                href="/accounts/teachers/"
                            >

                                Teacher List

                            </a>

                        </li>

                        <li>

                            <a
                                class="dropdown-item"
                                href="/accounts/add-teacher/"
                            >

                                Add Teacher

                            </a>

                        </li>

                    </ul>

                </li>

            </ul>

            <!-- RIGHT MENU -->

            <ul class="navbar-nav">

                <!-- USER -->

                <li class="nav-item">

                    <span class="nav-link text-warning">

                        Welcome,
                        {{ request.user.username }}

                    </span>

                </li>

                <!-- LOGOUT -->

                <li class="nav-item">

                    <a
                        class="nav-link text-danger"
                        href="/accounts/logout/"
                    >

                        Logout

                    </a>

                </li>

            </ul>

        </div>

    </div>

</nav>

<!-- PAGE CONTENT -->

<div class="container-fluid mt-4">

    {% block content %}

    {% endblock %}

</div>

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
