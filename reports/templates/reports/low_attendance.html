{% extends 'private_base.html' %}

{% block content %}

<h1 class="mb-4 text-danger">

    Low Attendance Students

</h1>

<table class="table table-bordered table-striped">

    <tr>

        <th>Student</th>

        <th>Attendance %</th>

    </tr>

    {% for item in low_students %}

    <tr>

        <td>{{ item.student.name }}</td>

        <td>{{ item.percentage }}%</td>

    </tr>

    {% endfor %}

</table>

{% endblock %}
