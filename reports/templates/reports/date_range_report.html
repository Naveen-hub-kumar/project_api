{% extends 'private_base.html' %}

{% block content %}

<h1 class="mb-4">

    Date Range Attendance Report

</h1>

<form method="GET" class="mb-4">

    <div class="row">

        <div class="col-md-4">

            <label class="form-label">

                Start Date

            </label>

            <input
                type="date"
                name="start_date"
                class="form-control"
            >

        </div>

        <div class="col-md-4">

            <label class="form-label">

                End Date

            </label>

            <input
                type="date"
                name="end_date"
                class="form-control"
            >

        </div>

        <div class="col-md-2 mt-4">

            <button
                type="submit"
                class="btn btn-primary"
            >

                Filter

            </button>

        </div>

    </div>

</form>

<table class="table table-bordered table-striped">

    <tr>

        <th>Student</th>

        <th>Date</th>

        <th>Status</th>

    </tr>

    {% for item in attendance %}

    <tr>

        <td>{{ item.student.name }}</td>

        <td>{{ item.date }}</td>

        <td>{{ item.status }}</td>

    </tr>

    {% endfor %}

</table>

{% endblock %}
